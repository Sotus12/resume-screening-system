<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Self-Updating Resume Screening System</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            background: linear-gradient(
                135deg,
                #0f172a,
                #1e293b,
                #334155
            );

            color: white;
        }

        .container{

            width: 500px;

            background: rgba(255,255,255,0.08);

            padding: 40px;

            border-radius: 20px;

            backdrop-filter: blur(10px);

            box-shadow: 0 8px 32px rgba(0,0,0,0.3);

            text-align: center;
        }

        h1{

            margin-bottom: 10px;

            font-size: 32px;
        }

        p{

            margin-bottom: 30px;

            color: #cbd5e1;
        }

        .upload-box{

            border: 2px dashed #94a3b8;

            padding: 30px;

            border-radius: 15px;

            margin-bottom: 25px;

            transition: 0.3s;
        }

        .upload-box:hover{

            border-color: #38bdf8;
        }

        input[type="file"]{

            color: white;
        }

        button{

            width: 100%;

            padding: 15px;

            border: none;

            border-radius: 10px;

            background: #38bdf8;

            color: white;

            font-size: 18px;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover{

            background: #0ea5e9;
        }

        .result{

            margin-top: 30px;

            padding: 20px;

            border-radius: 10px;

            background: rgba(255,255,255,0.1);

            font-size: 22px;

            font-weight: bold;

            color: #7dd3fc;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Resume Screening System</h1>

        <p>
            Upload a resume to predict the job category
            using Machine Learning
        </p>

        <form
            action="/predict"
            method="POST"
            enctype="multipart/form-data"
        >

            <div class="upload-box">

                <input
                    type="file"
                    name="resume"
                    accept=".pdf,.docx"
                    required
                >

            </div>

            <button type="submit">

                Predict Role

            </button>

        </form>

        {% if prediction_text %}

        <div class="result">

            {{ prediction_text }}

        </div>

        {% endif %}

    </div>

</body>

</html>
